openapi: 3.0.3
info:
  title: GUE Starter API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '201':
          description: Created
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK
  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
  /api/v1/auth/logout:
    post:
      summary: Logout user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
  /api/v1/user/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/generate:
    post:
      summary: Generate QRIS/VA from payment gateway
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/check-status/{trx_id}:
    post:
      summary: Check payment transaction status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: trx_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/inquiry:
    post:
      summary: Inquiry transfer fund to payment gateway
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/transfer:
    post:
      summary: Execute transfer fund in payment gateway
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/transfer/check-status/{partner_ref_no}:
    post:
      summary: Check transfer/disbursement status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partner_ref_no
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/balance/{merchant_uuid}:
    post:
      summary: Get gateway balance for merchant UUID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: merchant_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/callback/qris:
    post:
      summary: QRIS callback endpoint from payment gateway
      responses:
        '200':
          description: OK
  /api/v1/payments/gateway/callback/transfer:
    post:
      summary: Transfer callback endpoint from payment gateway
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
