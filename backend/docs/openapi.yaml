openapi: 3.0.3
info:
  title: GUE Starter API
  version: 1.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "201":
          description: Created
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: OK
  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: OK
  /api/v1/auth/logout:
    post:
      summary: Logout user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: OK
  /api/v1/user/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/user/password:
    patch:
      summary: Change password for the currently authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, confirm_password]
              properties:
                current_password:
                  type: string
                  minLength: 8
                new_password:
                  type: string
                  minLength: 8
                confirm_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: OK
  /api/v1/users:
    get:
      summary: Paginated user list with search and role filter scoped to actor hierarchy
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [dev, superadmin, admin, user]
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
    post:
      summary: Create user in actor hierarchy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [dev, superadmin, admin, user]
                is_active:
                  type: boolean
      responses:
        "201":
          description: Created
  /api/v1/tokos:
    get:
      summary: List visible tokos based on actor scope (all for dev/superadmin, self plus creator for others)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    post:
      summary: Create toko (max 3 tokos per user)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                callback_url:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Created
  /api/v1/banks:
    get:
      summary: Paginated bank accounts owned by the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
    post:
      summary: Create user bank account after confirming backend inquiry result
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, account_name, account_number, inquiry_id]
              properties:
                payment_id:
                  type: integer
                  format: int64
                account_name:
                  type: string
                account_number:
                  type: string
                inquiry_id:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Created
  /api/v1/banks/inquiry:
    post:
      summary: Verify bank account and resolve account_name via payment gateway inquiry before saving
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, account_number]
              properties:
                payment_id:
                  type: integer
                  format: int64
                account_number:
                  type: string
      responses:
        "200":
          description: Inquiry result resolved successfully
  /api/v1/banks/payment-options:
    get:
      summary: Searchable payment catalog options for bank picker
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/banks/{id}:
    delete:
      summary: Delete bank account owned by the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /api/v1/tokos/{id}:
    patch:
      summary: Update toko name and callback URL (dev/superadmin/admin only within visible scope)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                callback_url:
                  type: string
                  nullable: true
      responses:
        "200":
          description: OK
  /api/v1/tokos/{id}/regenerate-token:
    post:
      summary: Generate a new toko bearer token (dev/superadmin/admin only within visible scope)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /api/v1/tokos/workspace:
    get:
      summary: Paginated toko workspace with balances, search, and summary totals for dashboard toko page
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/tokos/balances:
    get:
      summary: List visible toko balances using the same toko visibility scope
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/tokos/{id}/settlement:
    patch:
      summary: Manual settlement update for toko balance (dev only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settlement_balance]
              properties:
                settlement_balance:
                  type: number
      responses:
        "200":
          description: OK
  /api/v1/testing/generate-qris:
    post:
      summary: Generate QRIS test flow for a visible toko using authenticated dashboard session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toko_id, username, amount]
              properties:
                toko_id:
                  type: integer
                  format: int64
                username:
                  type: string
                amount:
                  type: integer
                expire:
                  type: integer
                custom_ref:
                  type: string
      responses:
        "200":
          description: OK
  /api/v1/testing/callback-readiness:
    post:
      summary: Probe toko callback_url and verify HTTP 200 with JSON body {"success": true}
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toko_id]
              properties:
                toko_id:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Structured readiness result
  /api/v1/dashboard/overview:
    get:
      summary: Dashboard overview metrics and chart series
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/transactions/history:
    get:
      summary: Transaction history for authenticated user (paginated + filtered)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: q
          required: false
          schema:
            type: string
            description: Search across reference, player, and code
        - in: query
          name: from
          required: false
          schema:
            type: string
            description: RFC3339 or YYYY-MM-DD
        - in: query
          name: to
          required: false
          schema:
            type: string
            description: RFC3339 or YYYY-MM-DD
      responses:
        "200":
          description: OK
  /api/v1/transactions/history/export:
    get:
      summary: Export transaction history (csv/docx)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [csv, docx]
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
        - in: query
          name: to
          required: false
          schema:
            type: string
      responses:
        "200":
          description: File download
  /api/v1/users/{id}/role:
    patch:
      summary: Update user role (requires role dev/superadmin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [dev, superadmin, admin, user]
      responses:
        "200":
          description: OK
  /api/v1/users/{id}/active:
    patch:
      summary: Toggle user active status (requires role dev/superadmin/admin within hierarchy scope)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: boolean
      responses:
        "200":
          description: OK
  /api/v1/users/{id}:
    delete:
      summary: Delete user (requires role dev/superadmin/admin within hierarchy scope)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/generate:
    post:
      summary: Generate QRIS/VA using project bridge
      security:
        - tokoTokenAuth: []
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/check-status/{trx_id}:
    post:
      summary: Check payment transaction status
      security:
        - tokoTokenAuth: []
      parameters:
        - in: path
          name: trx_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/inquiry:
    post:
      summary: Inquiry transfer fund
      security:
        - tokoTokenAuth: []
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/transfer:
    post:
      summary: Execute transfer fund
      security:
        - tokoTokenAuth: []
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/transfer/check-status/{partner_ref_no}:
    post:
      summary: Check transfer/disbursement status
      security:
        - tokoTokenAuth: []
      parameters:
        - in: path
          name: partner_ref_no
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/balance:
    post:
      summary: Get gateway balance
      security:
        - tokoTokenAuth: []
      responses:
        "200":
          description: OK
  /api/v1/payments/gateway/callback/qris:
    post:
      summary: QRIS callback endpoint from payment gateway (async queued)
      responses:
        "202":
          description: Accepted
  /api/v1/payments/gateway/callback/transfer:
    post:
      summary: Transfer callback endpoint from payment gateway (async queued)
      responses:
        "202":
          description: Accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokoTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: TOKO_TOKEN
