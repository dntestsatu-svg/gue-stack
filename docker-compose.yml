services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: gue
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      MEMCACHED_ENABLED: "true"
      MEMCACHED_ADDR: memcached:11211
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      CACHE_QUERY_CACHE_ON: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_TOKEN_TTL: 15m
      JWT_REFRESH_TOKEN_TTL: 168h
      JWT_ISSUER: gue-starter
      JWT_AUDIENCE: gue-clients
      ASYNQ_CONCURRENCY: 10
      PAYMENT_GATEWAY_BASE_URL: ${PAYMENT_GATEWAY_BASE_URL:-https://rest.otomatis.vip}
      PAYMENT_GATEWAY_TIMEOUT: ${PAYMENT_GATEWAY_TIMEOUT:-15s}
      PAYMENT_GATEWAY_DEFAULT_CLIENT: ${PAYMENT_GATEWAY_DEFAULT_CLIENT:-}
      PAYMENT_GATEWAY_DEFAULT_KEY: ${PAYMENT_GATEWAY_DEFAULT_KEY:-}
      PAYMENT_GATEWAY_CALLBACK_SECRET: ${PAYMENT_GATEWAY_CALLBACK_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - memcached

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/worker"]
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: gue
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      MEMCACHED_ENABLED: "true"
      MEMCACHED_ADDR: memcached:11211
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      CACHE_QUERY_CACHE_ON: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_TOKEN_TTL: 15m
      JWT_REFRESH_TOKEN_TTL: 168h
      JWT_ISSUER: gue-starter
      JWT_AUDIENCE: gue-clients
      ASYNQ_CONCURRENCY: 10
      PAYMENT_GATEWAY_BASE_URL: ${PAYMENT_GATEWAY_BASE_URL:-https://rest.otomatis.vip}
      PAYMENT_GATEWAY_TIMEOUT: ${PAYMENT_GATEWAY_TIMEOUT:-15s}
      PAYMENT_GATEWAY_DEFAULT_CLIENT: ${PAYMENT_GATEWAY_DEFAULT_CLIENT:-}
      PAYMENT_GATEWAY_DEFAULT_KEY: ${PAYMENT_GATEWAY_DEFAULT_KEY:-}
      PAYMENT_GATEWAY_CALLBACK_SECRET: ${PAYMENT_GATEWAY_CALLBACK_SECRET:-}
    depends_on:
      - mysql
      - redis
      - memcached

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: gue
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  memcached:
    image: memcached:1.6-alpine
    ports:
      - "11211:11211"

volumes:
  mysql_data:
